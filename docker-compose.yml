version: '3.9'

services:
  db:
    image: postgres:15-alpine
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=bookstore_dev
      - POSTGRES_PASSWORD=bookstore_dev
      - POSTGRES_DB=bookstore_dev_db
    networks:
      - ebac_net

  web:
    build: .
    command: poetry run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/usr/src/app/
    environment:
      - PYTHONPATH=/opt/pysetup/.venv/lib/python3.13/site-packages
      - POETRY_VIRTUALENVS_CREATE=false
    ports:
      - 8000:8000
    env_file:
      - ./.env.dev
    depends_on:
      - db
    networks:
      - ebac_net

volumes:
  postgres_data:

networks:
  ebac_net:
    driver: bridge
